<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Boy Who Refused to Break</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Background ambient glow -->
<div class="bg-glow"></div>

<!-- ===================== SCREEN 1: TEASER / LANDING ===================== -->
<section id="screen-landing" class="screen active">
  <div class="landing-content">
    <p class="eyebrow fade-in delay-1">A True Story</p>
    <h1 class="book-title fade-in delay-2">The Boy Who Refused to Break</h1>
    <p class="book-subtitle fade-in delay-3">The Boy Who Refused to Break</p>
    <button id="btn-read-book" class="btn-primary fade-in delay-4">
      <span>Read Book</span>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M5 12h14M13 5l7 7-7 7"/>
      </svg>
    </button>
  </div>
</section>

<!-- ===================== SCREEN 2: LANGUAGE SELECTION ===================== -->
<section id="screen-language" class="screen">
  <div class="screen-inner">
    <h2 class="section-title">Choose Your Language</h2>
    <p class="section-subtitle">अपनी भाषा चुनें</p>

    <div class="lang-grid">
      <button class="lang-card" data-lang="hinglish">
        <span class="lang-name">Hinglish</span>
        <span class="lang-native">Hinglish Mix</span>
      </button>
      <button class="lang-card" data-lang="hindi">
        <span class="lang-name">हिंदी</span>
        <span class="lang-native">Hindi</span>
      </button>
      <button class="lang-card" data-lang="english">
        <span class="lang-name">English</span>
        <span class="lang-native">English</span>
      </button>
      <button class="lang-card" data-lang="punjabi">
        <span class="lang-name">ਪੰਜਾਬੀ</span>
        <span class="lang-native">Punjabi</span>
      </button>
    </div>
  </div>
</section>

<!-- ===================== SCREEN 3: CHAPTER LIST ===================== -->
<section id="screen-chapters" class="screen">
  <div class="screen-inner">
    <div class="chapters-header">
      <div>
        <h2 class="section-title" id="chapters-title">Chapters</h2>
        <p class="section-subtitle" id="chapters-subtitle">Select a chapter to begin reading</p>
      </div>
      <button id="btn-change-lang" class="btn-ghost">Change Language</button>
    </div>

    <div id="chapter-list" class="chapter-grid"></div>
  </div>
</section>

<!-- ===================== SCREEN 4: CHAPTER CONTENT ===================== -->
<section id="screen-reader" class="screen">
  <div class="reader-topbar">
    <button id="btn-back-chapters" class="btn-ghost">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
      <span>Back to Chapters</span>
    </button>

    <div class="lang-dropdown-wrap">
      <select id="lang-dropdown" class="lang-dropdown">
        <option value="hinglish">Hinglish</option>
        <option value="hindi">हिंदी</option>
        <option value="english">English</option>
        <option value="punjabi">ਪੰਜਾਬੀ</option>
      </select>
    </div>
  </div>

  <div class="reader-content">
    <p class="reader-chapter-label" id="reader-chapter-label">Chapter 1</p>
    <h2 class="reader-title" id="reader-title">Chapter Title</h2>
    <div class="reader-divider"></div>
    <div class="reader-text" id="reader-text">
      <!-- chapter text injected here -->
    </div>

    <div class="reader-nav">
      <button id="btn-prev-chapter" class="btn-ghost">← Previous</button>
      <button id="btn-next-chapter" class="btn-ghost">Next →</button>
    </div>
  </div>
</section>

<script src="script.js"></script>
</body>
</html>
